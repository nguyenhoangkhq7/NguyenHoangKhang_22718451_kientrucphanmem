server:
  port: 8081
  address: 172.16.55.185

spring:
  datasource:
    url: jdbc:mysql://172.16.55.185:3306/user_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: password # Using a placeholder root/root, user can update if needed
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  application:
    name: user-service

  # Logging configuration
logging:
  level:
    root: INFO
    nhk: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: INFO
    org.hibernate: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/user-service.log
    max-size: 10MB
    max-history: 10

app:
  jwtSecret: "404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970" # A secure 256-bit base64-encoded secret
  jwtExpirationMs: 86400000 # 24 hours
