version: '3.8'

services:
  web-server:
    image: nginx:alpine
    container_name: nginx-server
    networks:
      - private-network

  client-app:
    image: alpine
    container_name: alpine-client
    command: sh -c "while true; do echo 'Querying web-server...'; wget -qO- http://web-server | head -n 5; sleep 5; done"
    networks:
      - private-network
    depends_on:
      - web-server

networks:
  private-network:
    driver: bridge
