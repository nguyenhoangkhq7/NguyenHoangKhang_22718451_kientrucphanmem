services:
  elasticsearch:
    image: elasticsearch:8.10.2
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.enrollment.enabled=true
      - ELASTIC_PASSWORD=elastic_password_123
      - ELASTIC_USERNAME=elastic
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - elk_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s -u elastic:elastic_password_123 http://localhost:9200/_cluster/health | grep -q 'status'",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 1024m

  kibana:
    image: kibana:8.10.2
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=elastic_password_123
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - elk_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s http://localhost:5601/api/status | grep -q 'available'",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  elasticsearch_data:
    driver: local

networks:
  elk_network:
    driver: bridge
