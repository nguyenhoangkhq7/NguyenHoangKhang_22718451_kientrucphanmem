services:
  redis:
    image: redis:7-alpine
    container_name: django_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - django_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: redis-server --appendonly yes

  app:
    build: ./app
    container_name: django_app
    command: gunicorn --bind 0.0.0.0:8000 --workers 2 config.wsgi:application
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app
    environment:
      - DEBUG=False
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - django_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery_worker:
    build: ./app
    container_name: django_celery_worker
    command: celery -A config worker --loglevel=info --concurrency=4
    environment:
      - DEBUG=False
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
      app:
        condition: service_started
    networks:
      - django_network
    volumes:
      - ./app:/app

volumes:
  redis_data:

networks:
  django_network:
    driver: bridge
