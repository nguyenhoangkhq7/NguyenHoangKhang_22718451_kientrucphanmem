<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voting App</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        background: white;
        border-radius: 10px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        padding: 40px;
        max-width: 600px;
        width: 100%;
      }

      h1 {
        text-align: center;
        color: #333;
        margin-bottom: 40px;
      }

      .voting-options {
        display: flex;
        gap: 20px;
        margin-bottom: 40px;
      }

      .option {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      button {
        padding: 20px;
        font-size: 18px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        transition: all 0.3s ease;
        color: white;
      }

      .btn-a {
        background-color: #667eea;
      }

      .btn-a:hover {
        background-color: #5568d3;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
      }

      .btn-b {
        background-color: #764ba2;
      }

      .btn-b:hover {
        background-color: #65408a;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(118, 75, 162, 0.4);
      }

      .results {
        background: #f5f5f5;
        padding: 20px;
        border-radius: 5px;
        text-align: center;
      }

      .result-item {
        margin: 10px 0;
        color: #333;
      }

      .result-label {
        font-weight: bold;
        font-size: 16px;
      }

      .result-count {
        font-size: 24px;
        color: #667eea;
        margin-top: 5px;
      }

      .message {
        text-align: center;
        margin-top: 20px;
        padding: 10px;
        border-radius: 5px;
        display: none;
      }

      .message.success {
        background-color: #d4edda;
        color: #155724;
        display: block;
      }

      .message.error {
        background-color: #f8d7da;
        color: #721c24;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🗳️ Voting App</h1>

      <div class="voting-options">
        <div class="option">
          <button class="btn-a" onclick="vote('vote_a')">Vote for A</button>
        </div>
        <div class="option">
          <button class="btn-b" onclick="vote('vote_b')">Vote for B</button>
        </div>
      </div>

      <div class="results">
        <h3>Results</h3>
        <div class="result-item">
          <div class="result-label">Option A:</div>
          <div class="result-count" id="count-a">0</div>
        </div>
        <div class="result-item">
          <div class="result-label">Option B:</div>
          <div class="result-count" id="count-b">0</div>
        </div>
      </div>

      <div class="message" id="message"></div>
    </div>

    <script>
      function vote(choice) {
        fetch("/vote", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ choice: choice }),
        })
          .then((response) => response.json())
          .then((data) => {
            if (data.success) {
              showMessage("Vote recorded!", "success");
              updateResults();
            } else {
              showMessage("Error recording vote", "error");
            }
          })
          .catch((error) => {
            showMessage("Error: " + error, "error");
          });
      }

      function updateResults() {
        fetch("/api/votes")
          .then((response) => response.json())
          .then((data) => {
            document.getElementById("count-a").textContent = data.a;
            document.getElementById("count-b").textContent = data.b;
          })
          .catch((error) => console.error("Error updating results:", error));
      }

      function showMessage(text, type) {
        const messageDiv = document.getElementById("message");
        messageDiv.textContent = text;
        messageDiv.className = "message " + type;
        setTimeout(() => {
          messageDiv.className = "message";
        }, 3000);
      }

      // Update results every 2 seconds
      setInterval(updateResults, 2000);
      updateResults();
    </script>
  </body>
</html>
