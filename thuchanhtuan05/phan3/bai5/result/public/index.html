<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voting Results</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        background: white;
        border-radius: 10px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        padding: 40px;
        max-width: 600px;
        width: 100%;
      }

      h1 {
        text-align: center;
        color: #333;
        margin-bottom: 40px;
      }

      .results-container {
        display: flex;
        flex-direction: column;
        gap: 30px;
      }

      .result-item {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .result-label {
        font-size: 18px;
        font-weight: bold;
        color: #333;
      }

      .progress-bar {
        height: 40px;
        background-color: #e0e0e0;
        border-radius: 5px;
        overflow: hidden;
        position: relative;
      }

      .progress-fill {
        height: 100%;
        transition: width 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: bold;
      }

      .fill-a {
        background-color: #667eea;
      }

      .fill-b {
        background-color: #764ba2;
      }

      .vote-count {
        font-size: 14px;
        color: #666;
        margin-top: 5px;
      }

      .last-update {
        text-align: center;
        color: #999;
        font-size: 12px;
        margin-top: 40px;
      }

      .bar-container {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }

      .bar-label {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .count {
        font-size: 24px;
        font-weight: bold;
        color: #667eea;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>📊 Voting Results</h1>

      <div class="results-container">
        <div class="result-item">
          <div class="bar-label">
            <span class="result-label">Option A</span>
            <span class="count" id="count-a">0</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill fill-a" id="bar-a" style="width: 0%">
              <span id="percent-a">0%</span>
            </div>
          </div>
          <div class="vote-count" id="votes-a">0 votes</div>
        </div>

        <div class="result-item">
          <div class="bar-label">
            <span class="result-label">Option B</span>
            <span class="count" id="count-b">0</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill fill-b" id="bar-b" style="width: 0%">
              <span id="percent-b">0%</span>
            </div>
          </div>
          <div class="vote-count" id="votes-b">0 votes</div>
        </div>
      </div>

      <div class="last-update">
        Last updated: <span id="update-time">--:--:--</span>
      </div>
    </div>

    <script>
      function updateResults() {
        fetch("/api/results")
          .then((response) => response.json())
          .then((data) => {
            const totalVotes = data.a + data.b;
            const percentA =
              totalVotes > 0 ? ((data.a / totalVotes) * 100).toFixed(1) : 0;
            const percentB =
              totalVotes > 0 ? ((data.b / totalVotes) * 100).toFixed(1) : 0;

            document.getElementById("count-a").textContent = data.a;
            document.getElementById("count-b").textContent = data.b;
            document.getElementById("votes-a").textContent = data.a + " votes";
            document.getElementById("votes-b").textContent = data.b + " votes";

            document.getElementById("bar-a").style.width = percentA + "%";
            document.getElementById("bar-b").style.width = percentB + "%";

            document.getElementById("percent-a").textContent = percentA + "%";
            document.getElementById("percent-b").textContent = percentB + "%";

            const now = new Date();
            document.getElementById("update-time").textContent =
              now.getHours().toString().padStart(2, "0") +
              ":" +
              now.getMinutes().toString().padStart(2, "0") +
              ":" +
              now.getSeconds().toString().padStart(2, "0");
          })
          .catch((error) => console.error("Error fetching results:", error));
      }

      // Update results every 2 seconds
      setInterval(updateResults, 2000);
      updateResults();
    </script>
  </body>
</html>
